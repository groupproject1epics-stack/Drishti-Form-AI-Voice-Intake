<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes" />
    <title>Drishti-Form · AI Voice Intake</title>

    <!-- Font & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

    <style>
        /* ===== RESET & BASE ===== */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --primary: #0b5e7c;
            --primary-light: #1389b3;
            --primary-dark: #064257;
            --secondary: #f5a623;
            --accent: #e8f4f8;
            --success: #2d9b4e;
            --danger: #d1453b;
            --gray-50: #f9fbfc;
            --gray-100: #f0f4f8;
            --gray-200: #dde5ed;
            --gray-300: #b8c9d9;
            --gray-600: #4a5c6b;
            --gray-800: #1e2a36;
            --shadow: 0 12px 32px rgba(11, 94, 124, 0.12);
            --shadow-hover: 0 20px 48px rgba(11, 94, 124, 0.18);
            --radius: 20px;
            --radius-sm: 12px;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        html {
            scroll-behavior: smooth;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: var(--font);
            background: var(--gray-50);
            color: var(--gray-800);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            margin: 0;
            line-height: 1.5;
            background-image: radial-gradient(ellipse at 10% 20%, rgba(11, 94, 124, 0.04) 0%, transparent 60%),
                radial-gradient(ellipse at 90% 80%, rgba(245, 166, 35, 0.05) 0%, transparent 60%);
        }

        /* ===== MAIN CARD ===== */
        .app-container {
            width: 100%;
            max-width: 820px;
            margin: 0 auto;
        }

        .card {
            background: #ffffff;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 28px 24px 32px;
            transition: var(--transition);
            border: 1px solid rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(2px);
        }

        @media (min-width: 640px) {
            .card {
                padding: 40px 44px 44px;
            }
        }

        /* ===== HEADER ===== */
        .header {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 12px 16px;
            margin-bottom: 28px;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--gray-100);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 24px;
            flex-shrink: 0;
            box-shadow: 0 4px 10px rgba(11, 94, 124, 0.25);
        }

        .brand-text h1 {
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: -0.3px;
            color: var(--primary-dark);
            line-height: 1.2;
        }

        .brand-text .tagline {
            font-size: 0.8rem;
            color: var(--gray-600);
            font-weight: 500;
            letter-spacing: 0.2px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .brand-text .tagline i {
            font-size: 0.65rem;
            color: var(--secondary);
        }

        /* ===== LANGUAGE SELECTOR ===== */
        .lang-selector {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            background: var(--gray-100);
            padding: 4px;
            border-radius: 40px;
        }

        .lang-btn {
            border: none;
            background: transparent;
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--gray-600);
            cursor: pointer;
            transition: var(--transition);
            font-family: var(--font);
            white-space: nowrap;
        }

        .lang-btn:hover {
            color: var(--primary-dark);
            background: rgba(11, 94, 124, 0.06);
        }

        .lang-btn.active {
            background: #ffffff;
            color: var(--primary-dark);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        }

        .lang-btn:focus-visible {
            outline: 2px solid var(--primary);
            outline-offset: 2px;
        }

        /* ===== STATUS BANNER ===== */
        .status-banner {
            background: var(--accent);
            border-radius: var(--radius-sm);
            padding: 14px 18px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            border-left: 4px solid var(--primary-light);
        }

        .status-banner .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--gray-300);
            flex-shrink: 0;
            transition: var(--transition);
        }

        .status-banner .status-dot.listening {
            background: var(--danger);
            animation: pulse-dot 1s ease-in-out infinite;
        }
        .status-banner .status-dot.processing {
            background: var(--secondary);
            animation: pulse-dot 0.8s ease-in-out infinite;
        }
        .status-banner .status-dot.done {
            background: var(--success);
        }

        @keyframes pulse-dot {
            0%,
            100% {
                transform: scale(1);
                opacity: 1;
            }
            50% {
                transform: scale(1.5);
                opacity: 0.6;
            }
        }

        .status-banner .status-text {
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--primary-dark);
            flex: 1;
        }

        .status-banner .status-sub {
            font-size: 0.8rem;
            color: var(--gray-600);
            font-weight: 400;
            margin-left: auto;
        }

        /* ===== VOICE INPUT ZONE ===== */
        .voice-zone {
            background: var(--gray-50);
            border-radius: var(--radius-sm);
            padding: 24px 20px;
            margin-bottom: 28px;
            border: 2px dashed var(--gray-200);
            transition: var(--transition);
            text-align: center;
        }

        .voice-zone.active {
            border-color: var(--primary-light);
            background: rgba(11, 94, 124, 0.03);
        }

        .voice-zone .mic-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .mic-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: #fff;
            font-size: 36px;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 6px 20px rgba(11, 94, 124, 0.25);
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: manipulation;
            position: relative;
        }

        .mic-btn:hover {
            transform: scale(1.04);
            box-shadow: 0 10px 28px rgba(11, 94, 124, 0.32);
        }

        .mic-btn:active {
            transform: scale(0.94);
        }

        .mic-btn.listening {
            background: linear-gradient(135deg, var(--danger), #b03a32);
            animation: mic-pulse 1.2s ease-in-out infinite;
        }

        .mic-btn.processing {
            background: linear-gradient(135deg, var(--secondary), #d98e1c);
            animation: mic-pulse 0.9s ease-in-out infinite;
        }

        .mic-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
            animation: none !important;
        }

        @keyframes mic-pulse {
            0%,
            100% {
                box-shadow: 0 0 0 0 rgba(209, 69, 59, 0.35);
            }
            50% {
                box-shadow: 0 0 0 20px rgba(209, 69, 59, 0);
            }
        }

        .mic-label {
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--gray-600);
        }

        .mic-label .highlight {
            color: var(--primary-dark);
            font-weight: 600;
        }

        .transcript-box {
            margin-top: 16px;
            padding: 14px 18px;
            background: #ffffff;
            border-radius: var(--radius-sm);
            border: 1px solid var(--gray-200);
            min-height: 56px;
            font-size: 1rem;
            color: var(--gray-800);
            text-align: left;
            word-break: break-word;
            transition: var(--transition);
        }

        .transcript-box .placeholder {
            color: var(--gray-300);
            font-style: italic;
            font-weight: 400;
        }

        .transcript-box .spoken {
            color: var(--primary-dark);
            font-weight: 500;
        }

        /* ===== FORM ===== */
        .form-section {
            margin-top: 8px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 18px;
            margin-bottom: 24px;
        }

        @media (min-width: 540px) {
            .form-grid {
                grid-template-columns: 1fr 1fr;
            }
            .form-grid .full-width {
                grid-column: 1 / -1;
            }
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .form-group label {
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--gray-600);
            letter-spacing: 0.3px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .form-group label i {
            color: var(--primary-light);
            font-size: 0.8rem;
        }

        .form-group .field-hint {
            font-size: 0.7rem;
            font-weight: 400;
            color: var(--gray-300);
            margin-left: auto;
        }

        .form-control {
            padding: 12px 16px;
            border: 1.5px solid var(--gray-200);
            border-radius: var(--radius-sm);
            font-size: 0.95rem;
            font-family: var(--font);
            background: #ffffff;
            transition: var(--transition);
            color: var(--gray-800);
            width: 100%;
            min-height: 48px;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary-light);
            box-shadow: 0 0 0 4px rgba(11, 94, 124, 0.08);
        }

        .form-control::placeholder {
            color: var(--gray-300);
        }

        textarea.form-control {
            resize: vertical;
            min-height: 72px;
        }

        .form-control.ai-filled {
            border-color: var(--success);
            background: #f0faf3;
        }

        .form-control.ai-filled:focus {
            border-color: var(--success);
            box-shadow: 0 0 0 4px rgba(45, 155, 78, 0.12);
        }

        .ai-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 0.6rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            color: var(--success);
            background: #e6f5eb;
            padding: 2px 10px;
            border-radius: 40px;
        }

        /* ===== CONFIRMATION ===== */
        .confirm-section {
            background: var(--gray-50);
            border-radius: var(--radius-sm);
            padding: 18px 20px;
            margin-top: 8px;
            border: 1px solid var(--gray-200);
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 16px;
        }

        .confirm-section .confirm-label {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--gray-600);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .confirm-section .confirm-label i {
            color: var(--secondary);
            font-size: 1rem;
        }

        .confirm-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-left: auto;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px 22px;
            border: none;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 600;
            font-family: var(--font);
            cursor: pointer;
            transition: var(--transition);
            touch-action: manipulation;
            text-decoration: none;
            min-height: 48px;
        }

        .btn:focus-visible {
            outline: 2px solid var(--primary);
            outline-offset: 2px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: #fff;
            box-shadow: 0 4px 14px rgba(11, 94, 124, 0.25);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(11, 94, 124, 0.30);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        .btn-outline {
            background: transparent;
            color: var(--gray-600);
            border: 1.5px solid var(--gray-200);
        }

        .btn-outline:hover {
            background: var(--gray-100);
            border-color: var(--gray-300);
        }

        .btn-success {
            background: linear-gradient(135deg, var(--success), #238b44);
            color: #fff;
            box-shadow: 0 4px 14px rgba(45, 155, 78, 0.25);
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(45, 155, 78, 0.30);
        }

        .btn-success:active {
            transform: translateY(0);
        }

        .btn-success:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        .btn-danger-outline {
            background: transparent;
            color: var(--danger);
            border: 1.5px solid var(--danger);
        }

        .btn-danger-outline:hover {
            background: #fde8e6;
        }

        /* ===== TOAST / ALERT ===== */
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(120px);
            background: var(--gray-800);
            color: #fff;
            padding: 14px 28px;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 500;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.25);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
            z-index: 999;
            max-width: 90%;
            text-align: center;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
            pointer-events: auto;
        }

        .toast i {
            font-size: 1.2rem;
        }

        .toast.success {
            background: var(--success);
        }
        .toast.error {
            background: var(--danger);
        }
        .toast.info {
            background: var(--primary);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 480px) {
            .card {
                padding: 16px 14px 20px;
                border-radius: 16px;
            }

            .header {
                flex-direction: column;
                align-items: stretch;
                gap: 12px;
            }

            .brand-text h1 {
                font-size: 1.15rem;
            }

            .lang-selector {
                justify-content: center;
            }

            .lang-btn {
                padding: 5px 12px;
                font-size: 0.7rem;
            }

            .mic-btn {
                width: 68px;
                height: 68px;
                font-size: 28px;
            }

            .voice-zone {
                padding: 18px 14px;
            }

            .confirm-section {
                flex-direction: column;
                align-items: stretch;
            }

            .confirm-actions {
                margin-left: 0;
                justify-content: center;
            }

            .btn {
                padding: 8px 18px;
                font-size: 0.8rem;
                min-height: 42px;
            }

            .status-banner {
                padding: 12px 14px;
                font-size: 0.85rem;
            }

            .form-control {
                font-size: 0.9rem;
                padding: 10px 14px;
            }

            .toast {
                font-size: 0.8rem;
                padding: 12px 20px;
                bottom: 16px;
                max-width: 94%;
            }
        }

        @media (min-width: 1024px) {
            .card {
                padding: 48px 56px 52px;
            }
        }

        /* ===== UTILITY ===== */
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            border: 0;
        }

        .flex-center {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .gap-2 {
            gap: 8px;
        }

        .mt-2 {
            margin-top: 8px;
        }

        .text-center {
            text-align: center;
        }

        /* scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: var(--gray-100);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--gray-300);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--gray-600);
        }
    </style>
</head>
<body>

    <!-- ===== TOAST ===== -->
    <div id="toast" class="toast" role="alert" aria-live="polite">
        <i id="toastIcon" class="fas fa-info-circle"></i>
        <span id="toastMessage">Ready</span>
    </div>

    <!-- ===== APP ===== -->
    <div class="app-container">

        <div class="card" role="main" aria-label="Drishti-Form medical intake">

            <!-- HEADER -->
            <header class="header">
                <div class="brand">
                    <div class="brand-icon" aria-hidden="true">
                        <i class="fas fa-stethoscope"></i>
                    </div>
                    <div class="brand-text">
                        <h1>Drishti-Form</h1>
                        <div class="tagline">
                            <i class="fas fa-microphone-alt"></i>
                            <span>AI Voice Intake · India</span>
                        </div>
                    </div>
                </div>

                <div class="lang-selector" role="radiogroup" aria-label="Language selection">
                    <button class="lang-btn active" data-lang="en" role="radio" aria-checked="true">English</button>
                    <button class="lang-btn" data-lang="hi" role="radio" aria-checked="false">हिन्दी</button>
                    <button class="lang-btn" data-lang="te" role="radio" aria-checked="false">తెలుగు</button>
                    <button class="lang-btn" data-lang="ta" role="radio" aria-checked="false">தமிழ்</button>
                </div>
            </header>

            <!-- STATUS -->
            <div class="status-banner" id="statusBanner">
                <span class="status-dot" id="statusDot" aria-hidden="true"></span>
                <span class="status-text" id="statusText">Tap the mic &amp; speak naturally</span>
                <span class="status-sub" id="statusSub">Ready</span>
            </div>

            <!-- VOICE ZONE -->
            <section class="voice-zone" id="voiceZone" aria-label="Voice input">
                <div class="mic-wrapper">
                    <button class="mic-btn" id="micBtn" aria-label="Start voice recording">
                        <i class="fas fa-microphone" aria-hidden="true"></i>
                    </button>
                    <div class="mic-label">
                        <span class="highlight">Tap</span> and speak in your language
                    </div>
                    <div class="transcript-box" id="transcriptBox" aria-live="polite">
                        <span class="placeholder" id="transcriptPlaceholder">
                            <i class="fas fa-volume-up" style="margin-right:6px;"></i> Your speech will appear here…
                        </span>
                        <span class="spoken" id="transcriptText" style="display:none;"></span>
                    </div>
                </div>
            </section>

            <!-- FORM -->
            <section class="form-section" aria-label="Medical intake form">

                <div class="form-grid">

                    <!-- Age -->
                    <div class="form-group">
                        <label for="ageInput">
                            <i class="fas fa-calendar-alt"></i> Age
                            <span class="field-hint">(years)</span>
                        </label>
                        <input type="number" class="form-control" id="ageInput" placeholder="e.g. 45" min="0" max="150" />
                    </div>

                    <!-- Gender -->
                    <div class="form-group">
                        <label for="genderInput">
                            <i class="fas fa-venus-mars"></i> Gender
                        </label>
                        <select class="form-control" id="genderInput">
                            <option value="">Select…</option>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                            <option value="Other">Other</option>
                            <option value="Prefer not to say">Prefer not to say</option>
                        </select>
                    </div>

                    <!-- Symptoms (full-width) -->
                    <div class="form-group full-width">
                        <label for="symptomsInput">
                            <i class="fas fa-notes-medical"></i> Symptoms &amp; Duration
                            <span class="ai-badge"><i class="fas fa-sparkles"></i> AI</span>
                        </label>
                        <textarea class="form-control" id="symptomsInput" placeholder="e.g. Chest pain for 3 days, dizziness…"></textarea>
                    </div>

                    <!-- Medical History -->
                    <div class="form-group full-width">
                        <label for="historyInput">
                            <i class="fas fa-file-medical"></i> Medical History
                            <span class="ai-badge"><i class="fas fa-sparkles"></i> AI</span>
                        </label>
                        <textarea class="form-control" id="historyInput" placeholder="e.g. Diabetes, hypertension…"></textarea>
                    </div>

                    <!-- Allergies -->
                    <div class="form-group full-width">
                        <label for="allergiesInput">
                            <i class="fas fa-allergies"></i> Allergies
                            <span class="ai-badge"><i class="fas fa-sparkles"></i> AI</span>
                        </label>
                        <textarea class="form-control" id="allergiesInput" placeholder="e.g. Penicillin, peanuts…"></textarea>
                    </div>

                </div>

                <!-- CONFIRMATION (Human-in-the-loop) -->
                <div class="confirm-section">
                    <div class="confirm-label">
                        <i class="fas fa-user-nurse"></i>
                        <span>Nurse / Volunteer verification</span>
                    </div>
                    <div class="confirm-actions">
                        <button class="btn btn-outline" id="resetBtn" aria-label="Reset form">
                            <i class="fas fa-undo-alt"></i> Reset
                        </button>
                        <button class="btn btn-success" id="confirmBtn" disabled>
                            <i class="fas fa-check-circle"></i> Confirm &amp; Submit
                        </button>
                    </div>
                </div>

                <p style="font-size:0.7rem; color:var(--gray-300); margin-top:16px; text-align:center; letter-spacing:0.3px;">
                    <i class="fas fa-shield-alt"></i> Human-in-the-loop: confirm all details with patient before submission
                </p>

            </section>

        </div>
    </div>

    <script>
        // ============================================================
        //  DRISHTI-FORM — Full Client Logic
        //  Uses Web Speech API (SpeechRecognition) + simple entity extraction
        // ============================================================

        (function() {
            'use strict';

            // ---------- DOM refs ----------
            const micBtn = document.getElementById('micBtn');
            const statusText = document.getElementById('statusText');
            const statusSub = document.getElementById('statusSub');
            const statusDot = document.getElementById('statusDot');
            const transcriptBox = document.getElementById('transcriptBox');
            const transcriptPlaceholder = document.getElementById('transcriptPlaceholder');
            const transcriptText = document.getElementById('transcriptText');
            const voiceZone = document.getElementById('voiceZone');

            const ageInput = document.getElementById('ageInput');
            const genderInput = document.getElementById('genderInput');
            const symptomsInput = document.getElementById('symptomsInput');
            const historyInput = document.getElementById('historyInput');
            const allergiesInput = document.getElementById('allergiesInput');

            const confirmBtn = document.getElementById('confirmBtn');
            const resetBtn = document.getElementById('resetBtn');

            const langBtns = document.querySelectorAll('.lang-btn');
            const toast = document.getElementById('toast');
            const toastMsg = document.getElementById('toastMessage');
            const toastIcon = document.getElementById('toastIcon');

            // ---------- State ----------
            let currentLang = 'en'; // 'en' | 'hi' | 'te' | 'ta'
            let isListening = false;
            let isProcessing = false;
            let recognition = null;
            let hasSpoken = false;
            let formFilled = false;

            // Language labels for UI
            const LANG_LABELS = {
                en: { name: 'English', mic: 'Tap and speak in English', placeholder: 'Your speech will appear here…' },
                hi: { name: 'हिन्दी', mic: 'टैप करें और हिन्दी में बोलें', placeholder: 'आपकी बात यहाँ दिखेगी…' },
                te: { name: 'తెలుగు', mic: 'నొక్కండి మరియు తెలుగులో మాట్లాడండి', placeholder: 'మీ మాట ఇక్కడ కనిపిస్తుంది…' },
                ta: { name: 'தமிழ்', mic: 'தட்டி தமிழில் பேசுங்கள்', placeholder: 'உங்கள் பேச்சு இங்கே தோன்றும்…' }
            };

            // Simple entity extraction (rule-based + keyword)
            // In production, this would call a real LLM API.
            // We simulate AI extraction for demo with realistic patterns.
            function extractEntities(text) {
                const lower = text.toLowerCase();
                const entities = {
                    age: null,
                    gender: null,
                    symptoms: [],
                    history: [],
                    allergies: []
                };

                // --- Age ---
                const ageMatch = text.match(/\b(\d{1,3})\s*(years?|yrs?|yr|year|साल|వ|ஆண்டுகள்)/i);
                if (ageMatch) {
                    const ageNum = parseInt(ageMatch[1], 10);
                    if (ageNum > 0 && ageNum < 150) entities.age = ageNum;
                } else {
                    // fallback: any standalone number between 1-120
                    const numMatch = text.match(/\b([1-9][0-9]?|1[0-1][0-9]|120)\b/);
                    if (numMatch) {
                        const n = parseInt(numMatch[1], 10);
                        if (n > 0 && n < 130) entities.age = n;
                    }
                }

                // --- Gender ---
                const g = lower;
                if (g.includes('male') || g.includes('man') || g.includes('boy') || g.includes('पुरुष') || g.includes('పురుషుడు') || g
                    .includes('ஆண்')) {
                    entities.gender = 'Male';
                } else if (g.includes('female') || g.includes('woman') || g.includes('girl') || g.includes('महिला') || g.includes(
                        'స్త్రీ') || g.includes('பெண்')) {
                    entities.gender = 'Female';
                } else if (g.includes('other') || g.includes('अन्य') || g.includes('ఇతర') || g.includes('மற்ற')) {
                    entities.gender = 'Other';
                }

                // --- Symptoms (common keywords) ---
                const symptomKeywords = [
                    'pain', 'ache', 'hurt', 'cough', 'fever', 'dizziness', 'dizzy', 'headache', 'nausea',
                    'vomiting', 'chest', 'breath', 'shortness', 'fatigue', 'weakness', 'swelling', 'redness',
                    'rash', 'itching', 'sore', 'throat', 'stomach', 'abdomen', 'back', 'joint', 'muscle',
                    'cramp', 'spasm', 'palpitation', 'sweating', 'chills', 'congestion', 'runny nose',
                    'sneeze', 'wheeze', 'indigestion', 'constipation', 'diarrhea', 'urination', 'bleeding',
                    'bruise', 'numbness', 'tingling', 'vision', 'blur', 'ear', 'ringing', 'dental', 'tooth',
                    // Hindi
                    'दर्द', 'खांसी', 'बुखार', 'चक्कर', 'सिरदर्द', 'मतली', 'उल्टी', 'सीने', 'सांस', 'थकान',
                    'सूजन', 'लाली', 'दाने', 'खुजली', 'गले', 'पेट', 'पीठ', 'जोड़', 'मांसपेशी', 'ऐंठन',
                    // Telugu
                    'నొప్పి', 'దగ్గు', 'జ్వరం', 'తలతిరుగుడు', 'తలనొప్పి', 'వికారం', 'వాంతులు', 'ఛాతీ', 'శ్వాస',
                    'అలసట', 'వాపు', 'ఎరుపు', 'దద్దుర్లు', 'దురద', 'గొంతు', 'కడుపు', 'వెనుక', 'కీలు', 'కండరాలు',
                    // Tamil
                    'வலி', 'இருமல்', 'காய்ச்சல்', 'மயக்கம்', 'தலைவலி', 'குமட்டல்', 'வாந்தி', 'மார்பு', 'மூச்சு',
                    'சோர்வு', 'வீக்கம்', 'சிவத்தல்', 'தடிப்பு', 'அரிப்பு', 'தொண்டை', 'வயிறு', 'முதுகு', 'மூட்டு',
                    'தசை'
                ];

                const symptomsFound = [];
                for (const kw of symptomKeywords) {
                    if (lower.includes(kw)) {
                        symptomsFound.push(kw);
                    }
                }
                // Also extract duration phrases
                const durationMatch = text.match(/(\d+)\s*(days?|weeks?|months?|hours?|minutes?|दिन|सप्ताह|महीने|రోజులు|వారాలు|நாட்கள்|வாரங்கள்)/i);
                let durationText = '';
                if (durationMatch) {
                    durationText = ` for ${durationMatch[0]}`;
                }
                // Build a symptoms string
                if (symptomsFound.length > 0) {
                    // take top 4
                    const top = symptomsFound.slice(0, 4);
                    let symStr = top.join(', ');
                    if (durationText) symStr += durationText;
                    entities.symptoms = [symStr];
                } else if (text.trim().length > 3) {
                    // if no keywords, use the whole text as symptom description
                    let cleaned = text.replace(/\b(age|gender|male|female|history|allergy|allergies|medical|past|previous)\b/gi,
                        '').trim();
                    if (cleaned.length > 5) {
                        entities.symptoms = [cleaned.substring(0, 120)];
                    }
                }

                // --- Medical History ---
                const historyKeywords = ['diabetes', 'hypertension', 'blood pressure', 'heart', 'stroke', 'asthma', 'copd',
                    'kidney', 'liver', 'thyroid', 'cancer', 'tumor', 'surgery', 'operation', 'hospitalized',
                    'diabetic', 'cardiac', 'pulmonary', 'neurological', 'arthritis', 'osteoporosis',
                    'depression', 'anxiety', 'epilepsy', 'migraine',
                    // Hindi
                    'मधुमेह', 'उच्च रक्तचाप', 'हृदय', 'अस्थमा', 'गुर्दा', 'जिगर', 'थायराइड', 'कैंसर', 'सर्जरी',
                    // Telugu
                    'మధుమేహం', 'రక్తపోటు', 'గుండె', 'ఆస్తమా', 'మూత్రపిండాలు', 'కాలేయం', 'థైరాయిడ్', 'క్యాన్సర్',
                    // Tamil
                    'நீரிழிவு', 'உயர் இரத்த அழுத்தம்', 'இதயம்', 'ஆஸ்துமா', 'சிறுநீரகம்', 'கல்லீரல்', 'தைராய்டு', 'புற்றுநோய்'
                ];
                const histFound = [];
                for (const kw of historyKeywords) {
                    if (lower.includes(kw)) {
                        histFound.push(kw);
                    }
                }
                if (histFound.length > 0) {
                    entities.history = [histFound.slice(0, 4).join(', ')];
                }

                // --- Allergies ---
                const allergyKeywords = ['penicillin', 'sulfa', 'aspirin', 'ibuprofen', 'naproxen', 'latex', 'pollen',
                    'dust', 'mold', 'peanut', 'nuts', 'shellfish', 'egg', 'milk', 'soy', 'wheat', 'gluten',
                    'iodine', 'codeine', 'morphine',
                    // Hindi
                    'पेनिसिलिन', 'एस्पिरिन', 'लेटेक्स', 'पराग', 'धूल', 'मूंगफली', 'अंडा', 'दूध',
                    // Telugu
                    'పెన్సిలిన్', 'ఆస్పిరిన్', 'లేటెక్స్', 'పరాగం', 'దుమ్ము', 'వేరుశెనగ', 'గుడ్డు', 'పాలు',
                    // Tamil
                    'பென்சிலின்', 'ஆஸ்பிரின்', 'லேடெக்ஸ்', 'மகரந்தம்', 'தூசி', 'வேர்க்கடலை', 'முட்டை', 'பால்'
                ];
                const allergFound = [];
                for (const kw of allergyKeywords) {
                    if (lower.includes(kw)) {
                        allergFound.push(kw);
                    }
                }
                if (allergFound.length > 0) {
                    entities.allergies = [allergFound.slice(0, 4).join(', ')];
                }

                return entities;
            }

            // ---------- Populate form with extracted entities ----------
            function populateForm(entities) {
                let filled = false;
                if (entities.age !== null && entities.age !== undefined) {
                    ageInput.value = entities.age;
                    ageInput.classList.add('ai-filled');
                    filled = true;
                }
                if (entities.gender) {
                    const opts = genderInput.options;
                    for (let i = 0; i < opts.length; i++) {
                        if (opts[i].value.toLowerCase() === entities.gender.toLowerCase()) {
                            genderInput.selectedIndex = i;
                            genderInput.classList.add('ai-filled');
                            filled = true;
                            break;
                        }
                    }
                }
                if (entities.symptoms && entities.symptoms.length > 0) {
                    symptomsInput.value = entities.symptoms.join('; ');
                    symptomsInput.classList.add('ai-filled');
                    filled = true;
                }
                if (entities.history && entities.history.length > 0) {
                    historyInput.value = entities.history.join('; ');
                    historyInput.classList.add('ai-filled');
                    filled = true;
                }
                if (entities.allergies && entities.allergies.length > 0) {
                    allergiesInput.value = entities.allergies.join('; ');
                    allergiesInput.classList.add('ai-filled');
                    filled = true;
                }
                return filled;
            }

            // ---------- Check if form has any data ----------
            function hasFormData() {
                const fields = [ageInput, genderInput, symptomsInput, historyInput, allergiesInput];
                for (const f of fields) {
                    if (f.value && f.value.trim().length > 0) return true;
                }
                return false;
            }

            // ---------- Update confirm button ----------
            function updateConfirmBtn() {
                const hasData = hasFormData();
                confirmBtn.disabled = !hasData;
                if (hasData) {
                    confirmBtn.innerHTML = '<i class="fas fa-check-circle"></i> Confirm & Submit';
                } else {
                    confirmBtn.innerHTML = '<i class="fas fa-check-circle"></i> Confirm & Submit';
                }
            }

            // ---------- Toast ----------
            let toastTimer = null;

            function showToast(message, type = 'info') {
                toast.className = 'toast';
                toastIcon.className = 'fas';
                if (type === 'success') {
                    toast.classList.add('success');
                    toastIcon.classList.add('fa-check-circle');
                } else if (type === 'error') {
                    toast.classList.add('error');
                    toastIcon.classList.add('fa-exclamation-circle');
                } else {
                    toast.classList.add('info');
                    toastIcon.classList.add('fa-info-circle');
                }
                toastMsg.textContent = message;
                toast.classList.add('show');
                clearTimeout(toastTimer);
                toastTimer = setTimeout(() => {
                    toast.classList.remove('show');
                }, 4000);
            }

            // ---------- Set status ----------
            function setStatus(text, sub, dotState = 'idle') {
                statusText.textContent = text;
                if (sub) statusSub.textContent = sub;
                statusDot.className = 'status-dot';
                if (dotState === 'listening') statusDot.classList.add('listening');
                else if (dotState === 'processing') statusDot.classList.add('processing');
                else if (dotState === 'done') statusDot.classList.add('done');
            }

            // ---------- Update transcript ----------
            function setTranscript(text, isFinal = false) {
                if (text && text.trim().length > 0) {
                    transcriptPlaceholder.style.display = 'none';
                    transcriptText.style.display = 'inline';
                    transcriptText.textContent = text;
                    hasSpoken = true;
                    voiceZone.classList.add('active');
                } else {
                    transcriptPlaceholder.style.display = 'inline';
                    transcriptText.style.display = 'none';
                    hasSpoken = false;
                    voiceZone.classList.remove('active');
                }
            }

            // ---------- Speech Recognition ----------
            function initSpeech() {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (!SpeechRecognition) {
                    showToast('Speech recognition not supported in this browser.', 'error');
                    micBtn.disabled = true;
                    return null;
                }
                const rec = new SpeechRecognition();
                rec.continuous = false;
                rec.interimResults = true;
                rec.maxAlternatives = 1;

                // Map language code to BCP 47
                const langMap = {
                    en: 'en-IN',
                    hi: 'hi-IN',
                    te: 'te-IN',
                    ta: 'ta-IN'
                };
                rec.lang = langMap[currentLang] || 'en-IN';

                rec.onstart = function() {
                    isListening = true;
                    micBtn.classList.add('listening');
                    micBtn.classList.remove('processing');
                    micBtn.innerHTML = '<i class="fas fa-stop-circle"></i>';
                    setStatus('Listening… speak now', '🎤', 'listening');
                    voiceZone.classList.add('active');
                    showToast('Listening… speak clearly', 'info');
                };

                rec.onerror = function(event) {
                    console.warn('Speech error:', event.error);
                    if (event.error === 'not-allowed') {
                        showToast('Microphone access denied. Please allow and try again.', 'error');
                    } else if (event.error === 'no-speech') {
                        showToast('No speech detected. Tap and speak again.', 'error');
                    } else {
                        showToast('Error: ' + event.error, 'error');
                    }
                    stopListening();
                };

                rec.onend = function() {
                    stopListening();
                };

                rec.onresult = function(event) {
                    let interim = '';
                    let final = '';
                    for (let i = event.resultIndex; i < event.results.length; i++) {
                        const transcript = event.results[i][0].transcript;
                        if (event.results[i].isFinal) {
                            final += transcript;
                        } else {
                            interim += transcript;
                        }
                    }
                    const displayText = final || interim;
                    if (displayText) {
                        setTranscript(displayText, !!final);
                        statusSub.textContent = '✍️ ' + (final ? 'Final' : 'Interim…');
                    }
                    if (final) {
                        // Process final utterance
                        processUtterance(final);
                    }
                };

                return rec;
            }

            // ---------- Process utterance with "AI" extraction ----------
            function processUtterance(text) {
                if (!text || text.trim().length < 2) return;
                isProcessing = true;
                micBtn.classList.remove('listening');
                micBtn.classList.add('processing');
                micBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i>';
                setStatus('AI extracting medical data…', '🧠 processing', 'processing');
                showToast('Analyzing your symptoms…', 'info');

                // Simulate async AI processing (in real app, this would be an API call)
                setTimeout(() => {
                    const entities = extractEntities(text);
                    const filled = populateForm(entities);
                    formFilled = filled;
                    updateConfirmBtn();

                    if (filled) {
                        setStatus('Form auto-filled from your speech', '✅ verified', 'done');
                        showToast('Form populated! Please review with nurse.', 'success');
                        micBtn.classList.remove('processing');
                        micBtn.classList.add('done');
                        micBtn.innerHTML = '<i class="fas fa-check"></i>';
                        // reset mic after a moment
                        setTimeout(() => {
                            micBtn.classList.remove('done');
                            micBtn.innerHTML = '<i class="fas fa-microphone"></i>';
                            if (!isListening) {
                                setStatus('Tap the mic & speak naturally', 'Ready', 'idle');
                            }
                        }, 2000);
                    } else {
                        setStatus('Could not extract medical data clearly', 'try again', 'idle');
                        showToast('Please speak more clearly or fill manually.', 'error');
                        micBtn.classList.remove('processing');
                        micBtn.innerHTML = '<i class="fas fa-microphone"></i>';
                    }
                    isProcessing = false;
                    updateConfirmBtn();
                }, 800);
            }

            // ---------- Stop listening ----------
            function stopListening() {
                if (recognition) {
                    try { recognition.stop(); } catch (e) { /* ignore */ }
                }
                isListening = false;
                micBtn.classList.remove('listening', 'processing');
                micBtn.innerHTML = '<i class="fas fa-microphone"></i>';
                if (!isProcessing) {
                    setStatus('Tap the mic & speak naturally', 'Ready', 'idle');
                }
                voiceZone.classList.remove('active');
            }

            // ---------- Toggle mic ----------
            function toggleMic() {
                if (isListening) {
                    stopListening();
                    return;
                }
                if (isProcessing) {
                    showToast('Please wait, processing…', 'info');
                    return;
                }
                if (!recognition) {
                    recognition = initSpeech();
                    if (!recognition) return;
                }
                // Update language
                const langMap = { en: 'en-IN', hi: 'hi-IN', te: 'te-IN', ta: 'ta-IN' };
                recognition.lang = langMap[currentLang] || 'en-IN';

                // Reset transcript
                setTranscript('');
                try {
                    recognition.start();
                } catch (e) {
                    // sometimes start fails if already running
                    if (e.message && e.message.includes('already started')) {
                        stopListening();
                        setTimeout(() => toggleMic(), 200);
                    } else {
                        showToast('Error starting mic: ' + e.message, 'error');
                    }
                }
            }

            // ---------- Reset form ----------
            function resetForm() {
                if (isListening) stopListening();
                ageInput.value = '';
                genderInput.value = '';
                symptomsInput.value = '';
                historyInput.value = '';
                allergiesInput.value = '';
                setTranscript('');
                formFilled = false;
                // remove ai-filled class
                document.querySelectorAll('.ai-filled').forEach(el => el.classList.remove('ai-filled'));
                updateConfirmBtn();
                setStatus('Form reset', 'Ready', 'idle');
                showToast('Form cleared', 'info');
                micBtn.innerHTML = '<i class="fas fa-microphone"></i>';
                micBtn.classList.remove('listening', 'processing', 'done');
            }

            // ---------- Confirm & Submit ----------
            function confirmSubmit() {
                if (confirmBtn.disabled) {
                    showToast('Please fill in the form first.', 'error');
                    return;
                }
                // Gather data
                const data = {
                    age: ageInput.value,
                    gender: genderInput.value,
                    symptoms: symptomsInput.value,
                    history: historyInput.value,
                    allergies: allergiesInput.value,
                    language: currentLang,
                    timestamp: new Date().toISOString()
                };

                // In production: send to server
                console.log('📋 SUBMITTED:', data);

                // Show success
                showToast('✅ Form submitted successfully to doctor\'s queue!', 'success');
                setStatus('Submitted ✓', '👩‍⚕️ sent to doctor', 'done');

                // Disable confirm temporarily
                confirmBtn.disabled = true;
                confirmBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Submitting…';

                // Simulate server ack
                setTimeout(() => {
                    confirmBtn.innerHTML = '<i class="fas fa-check-circle"></i> Confirmed ✓';
                    confirmBtn.disabled = true;
                    // reset after a moment
                    setTimeout(() => {
                        resetForm();
                        confirmBtn.innerHTML = '<i class="fas fa-check-circle"></i> Confirm & Submit';
                        updateConfirmBtn();
                        setStatus('Tap the mic & speak naturally', 'Ready', 'idle');
                    }, 3000);
                }, 1200);
            }

            // ---------- Language switch ----------
            function setLanguage(lang) {
                if (lang === currentLang) return;
                currentLang = lang;
                langBtns.forEach(btn => {
                    const isActive = btn.dataset.lang === lang;
                    btn.classList.toggle('active', isActive);
                    btn.setAttribute('aria-checked', isActive ? 'true' : 'false');
                });

                // Update mic label
                const label = LANG_LABELS[lang] || LANG_LABELS.en;
                document.querySelector('.mic-label .highlight').textContent = label.mic;
                transcriptPlaceholder.innerHTML = '<i class="fas fa-volume-up" style="margin-right:6px;"></i> ' + label
                    .placeholder;

                // Re-init recognition with new language
                if (recognition) {
                    const langMap = { en: 'en-IN', hi: 'hi-IN', te: 'te-IN', ta: 'ta-IN' };
                    recognition.lang = langMap[lang] || 'en-IN';
                }
                showToast('Switched to ' + label.name, 'info');
            }

            // ---------- Event listeners ----------
            micBtn.addEventListener('click', toggleMic);

            resetBtn.addEventListener('click', resetForm);

            confirmBtn.addEventListener('click', confirmSubmit);

            langBtns.forEach(btn => {
                btn.addEventListener('click', function() {
                    setLanguage(this.dataset.lang);
                });
            });

            // Update confirm on manual form changes
            [ageInput, genderInput, symptomsInput, historyInput, allergiesInput].forEach(input => {
                input.addEventListener('input', function() {
                    if (this.value && this.value.trim().length > 0) {
                        this.classList.add('ai-filled');
                    } else {
                        this.classList.remove('ai-filled');
                    }
                    updateConfirmBtn();
                });
                input.addEventListener('change', updateConfirmBtn);
            });

            // Keyboard shortcut: Space to toggle mic when not in input
            document.addEventListener('keydown', function(e) {
                if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT')
                    return;
                if (e.code === 'Space' && !e.repeat) {
                    e.preventDefault();
                    toggleMic();
                }
                if (e.key === 'Enter' && e.ctrlKey) {
                    e.preventDefault();
                    confirmSubmit();
                }
            });

            // ---------- Init ----------
            function init() {
                // Set initial language UI
                setLanguage('en');
                updateConfirmBtn();
                setStatus('Tap the mic & speak naturally', 'Ready', 'idle');
                // Prefill with example for demo? No — keep clean.
                // But we can show a helpful hint
                setTimeout(() => {
                    showToast('🎤 Tap the mic and speak your symptoms', 'info');
                }, 600);
            }

            init();
